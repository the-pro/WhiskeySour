[pytest]
testpaths = tests/python
python_files = test_*.py bench_*.py fuzz_*.py
python_classes = Test* Bench*
python_functions = test_* bench_*

markers =
    slow: marks tests as slow (large documents, deselect with -m "not slow")
    fuzz: marks property-based / fuzz tests (require hypothesis)
    compat: marks bs4 API compatibility tests
    perf: marks performance / benchmark tests (require pytest-benchmark)

addopts =
    -v
    --tb=short
    --strict-markers

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
